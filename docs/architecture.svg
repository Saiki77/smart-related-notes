<svg width="100%" viewBox="0 0 680 1430" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How Smart Related Notes works: inferring structure from meaning, the pipeline, and concept search</title>
<desc>A tall document. Section 1 shows how the embedding model knows "The One Ring" is an item and "Frodo" is a character from their words alone. Section 2 is the chunk-embed-rank pipeline. Section 3 explains how vectors become ranks and clusters. Section 4 shows concept search returning member notes for a category query.</desc>
<style>
text{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
.h{font-size:20px;font-weight:600;}.sh{font-size:15px;font-weight:600;}.mut{font-size:12px;}.bx{font-size:13px;font-weight:600;}.chp{font-size:11px;}
.map{fill:none;stroke:#30363d;}.div{stroke:#30363d;}
.cA{fill:#16233f;stroke:#5b8def;}.cB{fill:#0c2a27;stroke:#2dd4bf;}.cC{fill:#342810;stroke:#fbbf24;}.cG{fill:#11301d;stroke:#4ade80;}.cI{fill:#1f2733;stroke:#64748b;}
.chip{fill:#161b22;stroke:#30363d;}.hiA{fill:#161b22;stroke:#5b8def;stroke-width:2;}.hiC{fill:#161b22;stroke:#fbbf24;stroke-width:2;}
.tInk{fill:#e6edf3;}.tMut{fill:#9aa4b2;}.tA{fill:#bcd0ff;}.tB{fill:#99f6e4;}.tC{fill:#fde68a;}.tG{fill:#86efac;}.tI{fill:#cbd5e1;}
.arw{stroke:#6b7280;stroke-width:1.5;fill:none;}.arwf{fill:#6b7280;}
</style>
<defs><marker id="m" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" class="arwf"/></marker></defs>

<text class="h tInk" x="40" y="46">How Smart Related Notes works</text>
<text class="mut tMut" x="40" y="70">it finds related notes by meaning, and infers your vault's structure without tags or links. local and offline.</text>
<line class="div" x1="40" y1="90" x2="640" y2="90"/>

<text class="sh tInk" x="40" y="122">1 · How does it know the One Ring is an item, not a character?</text>
<text class="mut tMut" x="40" y="144">nothing labels it. the embedding model places every note by what its words mean.</text>
<rect class="cI" x="40" y="164" width="170" height="60" rx="10"/><text class="bx tInk" x="125" y="189" text-anchor="middle">Frodo</text><text class="chp tMut" x="125" y="208" text-anchor="middle">hobbit · loyal · a journey</text>
<rect class="cI" x="40" y="244" width="170" height="60" rx="10"/><text class="bx tInk" x="125" y="269" text-anchor="middle">The One Ring</text><text class="chp tMut" x="125" y="288" text-anchor="middle">forged · golden · an artifact</text>
<text class="mut tMut" x="218" y="230">embed</text>
<line class="arw" x1="214" y1="238" x2="276" y2="238" marker-end="url(#m)"/>
<rect class="map" x="280" y="158" width="360" height="180" rx="12"/>
<text class="mut tMut" x="296" y="180">embedding space · position = meaning</text>
<rect class="cA" x="296" y="190" width="160" height="138" rx="12"/>
<text class="sh tA" x="308" y="210">characters</text>
<rect class="hiA" x="308" y="218" width="136" height="22" rx="6"/><text class="chp tA" x="376" y="233" text-anchor="middle">Frodo</text>
<rect class="chip" x="308" y="246" width="136" height="22" rx="6"/><text class="chp tA" x="376" y="261" text-anchor="middle">Gandalf</text>
<rect class="chip" x="308" y="274" width="136" height="22" rx="6"/><text class="chp tA" x="376" y="289" text-anchor="middle">Aragorn</text>
<rect class="cC" x="466" y="190" width="158" height="138" rx="12"/>
<text class="sh tC" x="478" y="210">items</text>
<rect class="hiC" x="478" y="218" width="134" height="22" rx="6"/><text class="chp tC" x="545" y="233" text-anchor="middle">The One Ring</text>
<rect class="chip" x="478" y="246" width="134" height="22" rx="6"/><text class="chp tC" x="545" y="261" text-anchor="middle">Mithril</text>
<rect class="chip" x="478" y="274" width="134" height="22" rx="6"/><text class="chp tC" x="545" y="289" text-anchor="middle">Andúril</text>
<text class="mut tMut" x="40" y="362">The Ring's note is about an OBJECT (forged, golden, an artifact), so its vector lands among the items;</text>
<text class="mut tMut" x="40" y="380">Frodo's is about a PERSON, so his lands among the characters. Same model, no tags, no rules.</text>
<line class="div" x1="40" y1="400" x2="640" y2="400"/>

<text class="sh tInk" x="40" y="432">2 · How a note becomes vectors</text>
<text class="mut tMut" x="40" y="454">split along its own structure, then embedded at three granularities</text>
<text class="mut tMut" x="40" y="482">chunk · structure-aware</text>
<rect class="cA" x="40" y="492" width="86" height="46" rx="8"/><text class="bx tA" x="83" y="516" text-anchor="middle">Note</text><text class="chp tA" x="83" y="530" text-anchor="middle">title, body, tags</text>
<rect class="cA" x="150" y="492" width="104" height="46" rx="8"/><text class="bx tA" x="202" y="516" text-anchor="middle">Sections</text><text class="chp tA" x="202" y="530" text-anchor="middle">by heading</text>
<rect class="cA" x="282" y="492" width="104" height="46" rx="8"/><text class="bx tA" x="334" y="516" text-anchor="middle">Ideas</text><text class="chp tA" x="334" y="530" text-anchor="middle">~200-500 words</text>
<rect class="cA" x="414" y="492" width="124" height="46" rx="8"/><text class="bx tA" x="476" y="516" text-anchor="middle">Passages</text><text class="chp tA" x="476" y="530" text-anchor="middle">token-safe windows</text>
<line class="arw" x1="126" y1="515" x2="148" y2="515" marker-end="url(#m)"/>
<line class="arw" x1="254" y1="515" x2="280" y2="515" marker-end="url(#m)"/>
<line class="arw" x1="386" y1="515" x2="412" y2="515" marker-end="url(#m)"/>
<line class="arw" x1="300" y1="538" x2="300" y2="562" marker-end="url(#m)"/>
<text class="mut tMut" x="40" y="578">embed · multi-granularity · int8 chunks · mean-centered · MiniLM or jina-v5</text>
<rect class="cB" x="40" y="588" width="182" height="46" rx="8"/><text class="bx tB" x="131" y="612" text-anchor="middle">Whole-note vector</text><text class="chp tB" x="131" y="626" text-anchor="middle">the note's gist</text>
<rect class="cB" x="244" y="588" width="156" height="46" rx="8"/><text class="bx tB" x="322" y="612" text-anchor="middle">Idea vectors</text><text class="chp tB" x="322" y="626" text-anchor="middle">one per idea</text>
<rect class="cB" x="424" y="588" width="182" height="46" rx="8"/><text class="bx tB" x="515" y="612" text-anchor="middle">Passage vectors</text><text class="chp tB" x="515" y="626" text-anchor="middle">fine detail</text>
<line class="arw" x1="300" y1="634" x2="300" y2="658" marker-end="url(#m)"/>
<text class="mut tMut" x="40" y="674">rank · multi-stage funnel</text>
<rect class="cA" x="40" y="684" width="128" height="46" rx="8"/><text class="bx tA" x="104" y="708" text-anchor="middle">Stage 1</text><text class="chp tA" x="104" y="722" text-anchor="middle">overall cosine</text>
<rect class="cA" x="190" y="684" width="150" height="46" rx="8"/><text class="bx tA" x="265" y="708" text-anchor="middle">Stage 2</text><text class="chp tA" x="265" y="722" text-anchor="middle">best idea / passage</text>
<rect class="cA" x="362" y="684" width="114" height="46" rx="8"/><text class="bx tA" x="419" y="708" text-anchor="middle">+ boost</text><text class="chp tA" x="419" y="722" text-anchor="middle">links, tags</text>
<rect class="cG" x="498" y="684" width="110" height="46" rx="8"/><text class="bx tG" x="553" y="708" text-anchor="middle">Cards</text><text class="chp tG" x="553" y="722" text-anchor="middle">ranked</text>
<line class="arw" x1="168" y1="707" x2="188" y2="707" marker-end="url(#m)"/>
<line class="arw" x1="340" y1="707" x2="360" y2="707" marker-end="url(#m)"/>
<line class="arw" x1="476" y1="707" x2="496" y2="707" marker-end="url(#m)"/>
<line class="div" x1="40" y1="754" x2="640" y2="754"/>

<text class="sh tInk" x="40" y="786">3 · From vectors to ranks and structure</text>
<text class="mut tMut" x="40" y="808">three things follow from the geometry alone</text>
<rect class="cI" x="40" y="822" width="14" height="14" rx="3"/><text class="bx tInk" x="62" y="834">center</text><text class="mut tMut" x="140" y="834">subtract the average note, so the common theme cancels and distinctive meaning remains.</text>
<rect class="cA" x="40" y="854" width="14" height="14" rx="3"/><text class="bx tInk" x="62" y="866">rank</text><text class="mut tMut" x="140" y="866">the nearest vectors are the most related; that is the ranked card list.</text>
<rect class="cC" x="40" y="886" width="14" height="14" rx="3"/><text class="bx tInk" x="62" y="898">structure</text><text class="mut tMut" x="140" y="898">near notes form clusters = the categories; a query expands into one to list its members.</text>
<line class="div" x1="40" y1="926" x2="640" y2="926"/>

<text class="sh tInk" x="40" y="958">4 · Answering a category query</text>
<text class="mut tMut" x="40" y="980">"characters" should return the members, not the note ABOUT them, even with no tags or links</text>
<rect class="map" x="40" y="996" width="600" height="300" rx="12"/>
<text class="mut tMut" x="56" y="1016">your vault in embedding space</text>
<rect class="cA" x="64" y="1026" width="250" height="150" rx="12"/>
<text class="sh tA" x="76" y="1046">characters</text>
<rect class="chip" x="72" y="1054" width="110" height="22" rx="6"/><text class="chp tA" x="127" y="1069" text-anchor="middle">Frodo</text>
<rect class="chip" x="72" y="1082" width="110" height="22" rx="6"/><text class="chp tA" x="127" y="1097" text-anchor="middle">Gandalf</text>
<rect class="chip" x="72" y="1110" width="110" height="22" rx="6"/><text class="chp tA" x="127" y="1125" text-anchor="middle">Aragorn</text>
<rect class="chip" x="192" y="1054" width="108" height="22" rx="6"/><text class="chp tA" x="246" y="1069" text-anchor="middle">Samwise</text>
<rect class="chip" x="192" y="1082" width="108" height="22" rx="6"/><text class="chp tA" x="246" y="1097" text-anchor="middle">Gollum</text>
<rect class="cB" x="340" y="1026" width="280" height="96" rx="12"/>
<text class="sh tB" x="352" y="1046">locations</text>
<rect class="chip" x="352" y="1054" width="120" height="22" rx="6"/><text class="chp tB" x="412" y="1069" text-anchor="middle">The Shire</text>
<rect class="chip" x="352" y="1082" width="120" height="22" rx="6"/><text class="chp tB" x="412" y="1097" text-anchor="middle">Rivendell</text>
<rect class="chip" x="480" y="1054" width="120" height="22" rx="6"/><text class="chp tB" x="540" y="1069" text-anchor="middle">Mordor</text>
<rect class="cC" x="340" y="1138" width="280" height="84" rx="12"/>
<text class="sh tC" x="352" y="1158">items</text>
<rect class="chip" x="352" y="1166" width="120" height="22" rx="6"/><text class="chp tC" x="412" y="1181" text-anchor="middle">The One Ring</text>
<rect class="chip" x="480" y="1166" width="120" height="22" rx="6"/><text class="chp tC" x="540" y="1181" text-anchor="middle">Mithril</text>
<rect class="cI" x="96" y="1196" width="226" height="24" rx="12"/><text class="chp tI" x="209" y="1212" text-anchor="middle">Characters of Middle-earth (index)</text>
<text class="mut tMut" x="209" y="1242" text-anchor="middle">a note ABOUT the category (the naive hit)</text>
<text class="mut tMut" x="40" y="1320">how the query "characters" resolves to its members:</text>
<rect class="cI" x="40" y="1330" width="124" height="50" rx="8"/><text class="bx tInk" x="102" y="1353" text-anchor="middle">query</text><text class="chp tMut" x="102" y="1369" text-anchor="middle">"characters"</text>
<line class="arw" x1="164" y1="1355" x2="178" y2="1355" marker-end="url(#m)"/>
<rect class="cI" x="180" y="1330" width="150" height="50" rx="8"/><text class="bx tI" x="255" y="1353" text-anchor="middle">naive hit</text><text class="chp tMut" x="255" y="1369" text-anchor="middle">the index note</text>
<line class="arw" x1="330" y1="1355" x2="352" y2="1355" marker-end="url(#m)"/>
<rect class="cC" x="354" y="1330" width="146" height="50" rx="8"/><text class="bx tC" x="427" y="1353" text-anchor="middle">expand</text><text class="chp tC" x="427" y="1369" text-anchor="middle">toward the members</text>
<line class="arw" x1="500" y1="1355" x2="524" y2="1355" marker-end="url(#m)"/>
<rect class="cA" x="526" y="1330" width="114" height="50" rx="8"/><text class="bx tA" x="583" y="1353" text-anchor="middle">members</text><text class="chp tA" x="583" y="1369" text-anchor="middle">Frodo, Gandalf…</text>
<text class="mut tMut" x="40" y="1410">the query-to-members step (concept search) is in design; everything above ships today.</text>
</svg>
